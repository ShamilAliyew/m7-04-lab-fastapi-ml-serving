openapi: 3.1.0

info:
title: Vision Moderation API
version: 1.0.0
description: API for image moderation and content classification.

servers:

* url: https://api.example.com

security:

* ApiKeyAuth: []

paths:
/v1/predict:
post:
summary: Predict labels for a single image
operationId: predictImage

```
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/PredictRequest'

  responses:
    '200':
      description: Prediction successful
      headers:
        X-Request-ID:
          schema:
            type: string
        X-Model-Version:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PredictResponse'

    '400':
      $ref: '#/components/responses/BadRequest'

    '401':
      $ref: '#/components/responses/Unauthorized'

    '413':
      $ref: '#/components/responses/PayloadTooLarge'

    '422':
      $ref: '#/components/responses/ValidationError'

    '429':
      $ref: '#/components/responses/RateLimited'

    '503':
      $ref: '#/components/responses/ServiceUnavailable'
```

/v1/predict-batch:
post:
summary: Predict labels for multiple images
operationId: predictBatch

```
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/BatchPredictRequest'

  responses:
    '200':
      description: Batch prediction successful
      headers:
        X-Request-ID:
          schema:
            type: string
        X-Model-Version:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchPredictResponse'

    '400':
      $ref: '#/components/responses/BadRequest'

    '401':
      $ref: '#/components/responses/Unauthorized'

    '413':
      $ref: '#/components/responses/PayloadTooLarge'

    '422':
      $ref: '#/components/responses/ValidationError'

    '429':
      $ref: '#/components/responses/RateLimited'

    '503':
      $ref: '#/components/responses/ServiceUnavailable'
```

/v1/predict-async:
post:
summary: Submit an async prediction job
operationId: submitAsyncPrediction

```
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/PredictRequest'

  responses:
    '202':
      description: Job accepted
      headers:
        X-Request-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncSubmitResponse'

    '400':
      $ref: '#/components/responses/BadRequest'

    '401':
      $ref: '#/components/responses/Unauthorized'

    '413':
      $ref: '#/components/responses/PayloadTooLarge'

    '422':
      $ref: '#/components/responses/ValidationError'

    '429':
      $ref: '#/components/responses/RateLimited'

    '503':
      $ref: '#/components/responses/ServiceUnavailable'
```

/v1/predictions/{job_id}:
get:
summary: Get async prediction result
operationId: getPredictionResult

```
  parameters:
    - name: job_id
      in: path
      required: true
      schema:
        type: string

  responses:
    '200':
      description: Job result returned
      headers:
        X-Request-ID:
          schema:
            type: string
        X-Model-Version:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncResult'

    '401':
      $ref: '#/components/responses/Unauthorized'

    '429':
      $ref: '#/components/responses/RateLimited'

    '503':
      $ref: '#/components/responses/ServiceUnavailable'
```

components:

securitySchemes:
ApiKeyAuth:
type: apiKey
in: header
name: X-API-Key

schemas:

```
PredictRequest:
  type: object
  required:
    - image_base64

  properties:
    image_base64:
      type: string
      description: Base64 encoded image

    top_k:
      type: integer
      minimum: 1
      maximum: 10
      default: 5

Prediction:
  type: object
  required:
    - label
    - probability

  properties:
    label:
      type: string

    probability:
      type: number
      minimum: 0
      maximum: 1

PredictResponse:
  type: object
  required:
    - model_version
    - predictions

  properties:
    model_version:
      type: string

    predictions:
      type: array
      items:
        $ref: '#/components/schemas/Prediction'

BatchItem:
  type: object
  required:
    - id
    - image_base64

  properties:
    id:
      type: string

    image_base64:
      type: string

BatchPredictRequest:
  type: object

  properties:
    top_k:
      type: integer
      minimum: 1
      maximum: 10
      default: 5

    items:
      type: array
      minItems: 1
      maxItems: 32

      items:
        $ref: '#/components/schemas/BatchItem'

BatchResult:
  type: object

  properties:
    id:
      type: string

    predictions:
      type: array
      items:
        $ref: '#/components/schemas/Prediction'

BatchPredictResponse:
  type: object

  properties:
    model_version:
      type: string

    results:
      type: array
      items:
        $ref: '#/components/schemas/BatchResult'

AsyncSubmitResponse:
  type: object

  properties:
    job_id:
      type: string

    status:
      type: string
      example: pending

AsyncResult:
  type: object

  properties:
    job_id:
      type: string

    status:
      type: string
      enum:
        - pending
        - running
        - completed
        - failed

    result:
      $ref: '#/components/schemas/PredictResponse'

Error:
  type: object
  required:
    - code
    - message
    - request_id

  properties:
    code:
      type: string

    message:
      type: string

    request_id:
      type: string
```

responses:

```
BadRequest:
  description: Bad request
  headers:
    X-Request-ID:
      schema:
        type: string
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'

Unauthorized:
  description: Invalid API key
  headers:
    X-Request-ID:
      schema:
        type: string
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'

PayloadTooLarge:
  description: Image exceeds 5 MB
  headers:
    X-Request-ID:
      schema:
        type: string
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'

ValidationError:
  description: Validation error
  headers:
    X-Request-ID:
      schema:
        type: string
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'

RateLimited:
  description: Too many requests
  headers:
    X-Request-ID:
      schema:
        type: string
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'

ServiceUnavailable:
  description: Service unavailable
  headers:
    X-Request-ID:
      schema:
        type: string
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'
```
